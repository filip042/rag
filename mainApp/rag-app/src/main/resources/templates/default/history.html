<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>History</title>
  <link rel="stylesheet" th:href="@{/css/default.css}">
  <link rel="stylesheet" th:href="@{/css/history.css}">
  <link rel="stylesheet" th:href="@{/css/headerFooterLayout.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<h2>Question History</h2>

<div class="controls">
  <button onclick="sortQuestions('asc')">Sort Ascending</button>
  <button onclick="sortQuestions('desc')">Sort Descending</button>
  <input type="text" id="filterInput" placeholder="Filter questions..." oninput="filterQuestions()">
</div>

<div id="questionList">
  <div th:each="question : ${questions}" class="question-card" th:attr="data-id=${question.id}">
    <div class="question-header">
      <span class="question-time" th:text="${question.getFormattedAnswerTime()}">Answer time</span>
    </div>

    <div class="question-section">
      <strong>Question:</strong>
      <p th:text="${question.getQuestion()}">Question</p>
    </div>

    <div class="answer-section">
      <strong>Answer:</strong>
      <p th:text="${question.getAnswer()}">Answer</p>
    </div>

    <div class="sources-section" th:if="${question.getSources() != null and !question.getSources().isEmpty()}">
      <strong>Sources:</strong>
      <ul>
        <li th:each="source : ${question.getSources()}" th:text="${source}">Source</li>
      </ul>
    </div>
  </div>
</div>

<form action="#" th:action="@{/user/chat}" method="get">
  <input type="submit" value="Return">
</form>

<script th:src="@{/js/sort-questions.js}"></script>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
