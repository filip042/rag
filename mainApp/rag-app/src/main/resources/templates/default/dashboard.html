<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/default.css}">
    <link rel="stylesheet" th:href="@{/css/headerFooterLayout.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div th:if="${availableProjects != null && !availableProjects.isEmpty()}">
    <form action="#" th:action="@{/user/dashboard}" method="post">
        <label for="projects">Available Projects:</label>
        <select id="projects" name="projectId" required>
            <option th:each="option : ${availableProjects}" th:value="${option.id}" th:text="${option.name}"/>
        </select>
        <br>
        <input type="submit" value="Select">
    </form>
    <br>
</div>

<div class="button-row" th:if="${!guest}">
<form class="button-row-form" action="#" th:action="@{/user/newProject}" method="get" th:object="${users}">
    <button type="submit">New Project</button>
</form>
</div>

<div class="button-row">
    <form class="button-row-form" action="#" th:action="@{/user/logout}" method="get">
        <button type="submit">Log Out</button>
    </form>

    <form class="button-row-form" th:if="${!guest}" action="#" th:action="@{/user/deleteUser}" method="post">
        <button type="submit" class="delete" onclick="return confirm('Are you sure you want to delete this user?');">Delete User</button>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
