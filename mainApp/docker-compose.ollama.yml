version: "3.9"

services:
  app:
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull ${OLLAMA_CHAT_MODEL}
        ollama pull ${OLLAMA_EMBED_MODEL}
        wait
    healthcheck:
      # Just confirms the server responds -- checking for an exact model
      # name via grep was too fragile (tag naming, timing, etc.)
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      retries: 30
      start_period: 60s

volumes:
  ollamadata: