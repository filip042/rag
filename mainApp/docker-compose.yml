services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/appdb
      - SPRING_DATASOURCE_USERNAME=appuser
      - SPRING_DATASOURCE_PASSWORD=apppass
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8080:8080"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      retries: 10
      start_period: 30s

  docs:
    profiles: ["docs"]
    image: maven:3.9-eclipse-temurin-24
    working_dir: /app
    volumes:
      - .:/app
      - docsdata:/app/target/reports
      - maven-repo:/root/.m2
    command: ["mvn", "javadoc:aggregate", "-B"]

  docs-server:
    profiles: ["docs"]
    image: nginx:alpine
    depends_on:
      docs:
        condition: service_completed_successfully
    volumes:
      - docsdata:/usr/share/nginx/html/site:ro
    ports:
      - "8081:80"
    command:
      - /bin/sh
      - -c
      - |
        echo "<meta http-equiv='refresh' content='0; url=/site/apidocs/index.html'>" > /usr/share/nginx/html/index.html
        nginx -g 'daemon off;'

volumes:
  dbdata:
  docsdata:
  maven-repo: