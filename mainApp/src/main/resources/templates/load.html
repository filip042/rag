<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Form</title>
</head>
<body>
  <form action="#" th:action="@{/user/answer}" method="post">
    <label for="question">Question:</label><br>
    <input type="text" id="question" name="question" required><br>
    <input type="submit" value="Submit">
  </form>

  <form action="#" th:action="@{/user/load}" method="post"> <!-- need path, doesn't work -->
      <label for="directory">Directory:</label><br>
      <input type="text" id="directory" name="directory" required><br>
      <button type="submit">Upload Directory</button>
  </form>

  <br>

  <form action="#" th:action="@{/user/dashboard}" method="get">
      <button type="submit">Return</button>
  </form>

  <br>

  <form action="#" th:action="@{/user/deleteProject}" method="post">
      <button type="submit" onclick="return confirm('Are you sure you want to submit?');">Delete Project</button>
  </form>
</body>
</html>
